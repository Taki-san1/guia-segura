{% extends "users/base.html" %}
{% load static %}

{% block content %}
<div class="container mt-5">

    <h2 class="fw-bold mb-4">
        <i class="fas fa-plus-circle"></i>
        Agregar Evento — Guía {{ numero_guia }}
    </h2>

    <p><strong>ID Consulta:</strong> {{ consulta_id }}</p>

    <form method="POST" class="shadow p-4 rounded bg-white mt-4">
        {% csrf_token %}

        <!-- 📅 FECHA -->
        <div class="mb-3">
            <label class="form-label fw-bold">Fecha:</label>
            <input type="date" name="fecha" id="fechaInput" class="form-control" required>
        </div>

        <!-- ⏰ HORA -->
        <div class="mb-3">
            <label class="form-label fw-bold">Hora:</label>
            <input type="time" name="hora" id="horaInput" class="form-control" required>
        </div>

        <!-- 📌 ESTADO (Select) -->
        <div class="mb-3">
            <label class="form-label fw-bold">Estado:</label>
            <select name="estado" id="estadoSelect" class="form-select" required>
                <option value="">Seleccione un estado...</option>
                <option>Recibimos tu envío</option>
                <option>En Centro Logístico Origen</option>
                <option>Viajando a tu destino</option>
                <option>En Centro Logístico de Tránsito</option>
                <option>En Centro Logístico Destino</option>
                <option>Ya puedes recoger tu envío</option>
                <option>Tu envío fue entregado</option>
                <option>Se retrasó el envío</option>
                <option value="otro">Otro (escribir manualmente)</option>
            </select>

            <!-- Campo para escribir estado personalizado -->
            <input type="text" id="estadoOtro" 
                   name="estado_otro" 
                   class="form-control mt-2" 
                   placeholder="Escribe el estado..." 
                   style="display: none;">
        </div>

        <!-- 🏢 SUCURSAL -->
        <!-- Sucursal / Ciudad -->
    <div class="mb-3">
        <label class="form-label fw-bold">Sucursal / Ciudad:</label>

        <!-- SELECT DEPARTAMENTO -->
        <select id="selectDepartamento" class="form-select" required>
            <option value="">Seleccione un Departamento...</option>
        </select>

        <!-- SELECT CIUDAD -->
        <select id="selectCiudad" class="form-select mt-2" required>
            <option value="">Seleccione primero un Departamento...</option>
        </select>

        <!-- País fijo -->
        <input type="text" class="form-control mt-2" value="COL" readonly>

        <!-- Input real enviado al backend -->
        <input type="hidden" name="sucursal" id="sucursalFinal">
    </div>

        <button class="btn btn-success w-100 mt-3">
            <i class="fas fa-save"></i> Guardar Evento
        </button>
    </form>

    <a href="{% url 'detalle_consulta' consulta_id %}" class="btn btn-secondary mt-3">
        <i class="fas fa-arrow-left"></i> Volver al Detalle
    </a>

</div>

<script>
    // Fecha y hora automática
    document.addEventListener("DOMContentLoaded", function () {
        let fechaInput = document.getElementById("fechaInput");
        let horaInput = document.getElementById("horaInput");

        fechaInput.value = new Date().toISOString().split("T")[0];

        let ahora = new Date();
        horaInput.value = ahora.toTimeString().slice(0, 5);
    });

    // Mostrar campo "otro" en estados
    const estadoSelect = document.getElementById("estadoSelect");
    const estadoOtro = document.getElementById("estadoOtro");

    estadoSelect.addEventListener("change", function () {
        if (this.value === "otro") {
            estadoOtro.style.display = "block";
            estadoOtro.required = true;
        } else {
            estadoOtro.style.display = "none";
            estadoOtro.required = false;
        }
    });
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const ciudadesPorDepartamento = {
        "ANTIOQUIA": ["Medellín", "Envigado", "Bello", "Itagüí"],
        "ATLÁNTICO": ["Barranquilla", "Soledad", "Malambo"],
        "BOLÍVAR": ["Cartagena", "Magangué", "Turbaco"],
        "BOYACÁ": ["Tunja", "Duitama", "Sogamoso"],
        "CALDAS": ["Manizales", "Chinchiná"],
        "CAUCA": ["Popayán", "Santander de Quilichao"],
        "CESAR": ["Valledupar"],
        "CÓRDOBA": ["Montería", "Lorica"],
        "CUNDINAMARCA": ["Bogotá", "Soacha", "Zipaquirá", "Facatativá"],
        "HUILA": ["Neiva", "Pitalito"],
        "LA GUAJIRA": ["Riohacha", "Maicao"],
        "MAGDALENA": ["Santa Marta"],
        "META": ["Villavicencio"],
        "NARIÑO": ["Pasto", "Ipiales"],
        "NORTE DE SANTANDER": ["Cúcuta", "Ocaña"],
        "QUINDÍO": ["Armenia"],
        "RISARALDA": ["Pereira", "Dosquebradas"],
        "SANTANDER": ["Bucaramanga", "Floridablanca", "Girón"],
        "SUCRE": ["Sincelejo"],
        "TOLIMA": ["Ibagué", "Espinal"],
        "VALLE DEL CAUCA": ["Cali", "Palmira", "Buga", "Tuluá"]
    };

    const selectDepartamento = document.getElementById("selectDepartamento");
    const selectCiudad = document.getElementById("selectCiudad");
    const sucursalFinal = document.getElementById("sucursalFinal");

    // Llenar departamentos
    Object.keys(ciudadesPorDepartamento).forEach(dep => {
        let opt = document.createElement("option");
        opt.value = dep;
        opt.textContent = dep;
        selectDepartamento.appendChild(opt);
    });

    // Cuando cambia el departamento
    selectDepartamento.addEventListener("change", function () {
        selectCiudad.innerHTML = '<option value="">Seleccione una ciudad...</option>';
        let depto = this.value;

        if (ciudadesPorDepartamento[depto]) {
            ciudadesPorDepartamento[depto].forEach(ciudad => {
                let opt = document.createElement("option");
                opt.value = ciudad.toUpperCase();
                opt.textContent = ciudad;
                selectCiudad.appendChild(opt);
            });
        }

        actualizarSucursal();
    });

    // Cuando cambia la ciudad
    selectCiudad.addEventListener("change", actualizarSucursal);

    function actualizarSucursal() {
        let d = selectDepartamento.value;
        let c = selectCiudad.value;
        if (d && c) {
            sucursalFinal.value = `${c}/${d}/COL`;
        }
    }
});
</script>


{% endblock %}
