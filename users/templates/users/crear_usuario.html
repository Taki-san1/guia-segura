{% extends "users/base.html" %}
{% block content %}
<h2>Crear Usuario</h2>

<form method="POST">
    {% csrf_token %}
    
    <input class="form-control" name="username" placeholder="Usuario" required>
    <input class="form-control mt-2" name="email" placeholder="Email">

    <input class="form-control mt-2" name="password" placeholder="Contraseña" required>

    <!-- Selección del rol -->
    <label class="mt-3 fw-bold">Rol:</label>
    <select name="role" class="form-control">
        <option value="normal">Usuario Normal</option>
        <option value="staff">Staff</option>
        <option value="superuser">Superusuario</option>
    </select>

    <button class="btn btn-success mt-3">Crear</button>
</form>

{% endblock %}
